<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>{% block title %}CodeHealthAnalyzer Report{% endblock %}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 2rem; background-color: #f8f9fa; color: #212529; }
    h1, h2 { color: #343a40; }
    .card { background-color: #fff; border: 1px solid #dee2e6; border-radius: .25rem; margin-bottom: 1rem; }
    .card-header { padding: .75rem 1.25rem; margin-bottom: 0; background-color: #e9ecef; border-bottom: 1px solid #dee2e6; }
    .card-body { padding: 1.25rem; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; background-color: #fff; }
    th, td { border: 1px solid #dee2e6; padding: 8px; }
    th { background: #f2f2f2; text-align: left; }
    .ok { color: #28a745; }
    .warn { color: #ffc107; }
    .err { color: #dc3545; }
    .section { margin-top: 2rem; }
    .container { max-width: 1200px; margin: auto; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sortable/0.8.0/js/sortable.min.js"></script>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
